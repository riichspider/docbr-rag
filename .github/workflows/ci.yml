name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434

    steps:
    - name: Checkout code
      uses: actions/checkout@v5         # era @v4 (Node 20 depreciado)
      with:
        fetch-depth: 0

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5    # era @v4 (Node 20 depreciado)
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v4            # era @v3 (depreciado)
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential curl

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel    # FIX: resolve BackendUnavailable
        pip install -e ".[dev]"

    - name: Pull Ollama model
      run: |
        sleep 30
        ollama pull llama3.2:3b || echo "Using fallback model"

    - name: Lint with Ruff
      run: |
        ruff check src/ tests/
        ruff format --check src/ tests/

    - name: Type check with MyPy
      run: |
        mypy src/ --ignore-missing-imports

    - name: Run unit tests
      run: |
        pytest tests/unit/ -v --cov=src/docbr_rag --cov-report=xml

    - name: Run integration tests
      run: |
        pytest tests/integration/ -v --cov=src/docbr_rag --cov-report=xml --cov-append
      env:
        DOCBR_LLM_MODEL: llama3.2:3b
        DOCBR_LOG_LEVEL: DEBUG

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5  # era @v3 (Node 20 depreciado)
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - name: Checkout code
      uses: actions/checkout@v5        # era @v4 (Node 20 depreciado)

    - name: Run Bandit Security Scan
      run: |
        pip install "bandit[toml]"
        bandit -r src/ -f json -o bandit-report.json --exit-zero || true
        echo "Bandit scan completed"

    - name: Upload Bandit Report
      uses: actions/upload-artifact@v4  # FIX: era @v3 (depreciado — causava falha em 2s)
      with:
        name: bandit-report
        path: bandit-report.json

    - name: Install Safety
      run: |
        pip install safety==3.2.9

    - name: Run Safety Check
      run: |
        safety scan --output json > safety-report.json

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test]
    steps:
    - name: Checkout code
      uses: actions/checkout@v5        # era @v4 (Node 20 depreciado)

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: riichspider/docbr-rag
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v5        # era @v4 (Node 20 depreciado)

    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          cd /opt/docbr-rag
          docker-compose pull
          docker-compose up -d
          docker system prune -f

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'release'

    steps:
    - name: Checkout code
      uses: actions/checkout@v5        # era @v4 (Node 20 depreciado)

    - name: Set up Python
      uses: actions/setup-python@v5   # era @v4 (Node 20 depreciado)
      with:
        python-version: "3.11"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine setuptools setuptools-scm

    - name: Build package
      run: |
        python -m build

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}

  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v5        # era @v4 (Node 20 depreciado)

    - name: Set up Python
      uses: actions/setup-python@v5   # era @v4 (Node 20 depreciado)
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel   # consistência com o job test
        pip install -e ".[dev]"

    - name: Build documentation
      run: |
        mkdocs build

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./site
